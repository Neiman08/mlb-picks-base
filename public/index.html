<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MLB Picks Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
      color: #7dd3fc;
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    input, button {
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }

    input {
      background: #fff;
      color: #111;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: #11182d;
      border: 1px solid #1f2a44;
      border-radius: 16px;
      padding: 16px;
    }

    .pick {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
    }

    .high { background: rgba(34,197,94,.2); }
    .medium { background: rgba(234,179,8,.2); }
    .low { background: rgba(239,68,68,.2); }

    .section {
      margin-top: 10px;
      padding: 10px;
      background: #1a233a;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<h1>MLB Picks Dashboard 🚀</h1>

<div class="topbar">
  <input type="date" id="date"/>
  <button onclick="loadGames()">Cargar juegos</button>
</div>

<div id="games" class="grid"></div>

<script>
const dateInput = document.getElementById("date");
const gamesContainer = document.getElementById("games");

dateInput.value = new Date().toISOString().split("T")[0];

function confidenceClass(confidence){
  if(confidence === "alta") return "high";
  if(confidence === "media") return "medium";
  return "low";
}

async function loadGames(){
  const date = dateInput.value;
  gamesContainer.innerHTML = "Cargando...";

  const res = await fetch(`/api/games?date=${date}`);
  const data = await res.json();

  gamesContainer.innerHTML = "";

  data.games.forEach(game => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>⚾ ${game.awayTeam} vs ${game.homeTeam}</h3>
      <p>${new Date(game.gameDate).toLocaleString()}</p>

      <button onclick="analyzeGame(${game.gamePk}, '${date}', this)">
        Analizar
      </button>

      <div class="result"></div>
    `;

    gamesContainer.appendChild(card);
  });
}

async function analyzeGame(gamePk, date, btn){
  const card = btn.closest(".card");
  const result = card.querySelector(".result");

  result.innerHTML = "Analizando...";

  const res = await fetch(`/api/analyze/${gamePk}?date=${date}`);
  const data = await res.json();

  const a = data.analysis;

  result.innerHTML = `
    <div class="pick ${confidenceClass(a.confidence)}">
      🔥 Pick: ${a.pick} <br>
      📊 Confianza: ${a.confidence} <br>
      📈 Probabilidad: ${a.home.modelWinPct > a.away.modelWinPct ? a.home.modelWinPct : a.away.modelWinPct}% 
    </div>

    <!-- RUN LINE -->
    <div class="section">
      ⚾ Run Line: ${a.runLine.pick} <br>
      📊 Prob: ${a.runLine.coverProb}% <br>
      📈 Confianza: ${a.runLine.confidence}
    </div>

    <!-- TEAM TOTALS -->
    <div class="section">
      🔥 ${a.away.team}: ${a.teamTotals.away.pick} (${a.teamTotals.away.probability}%)<br>
      ❄️ ${a.home.team}: ${a.teamTotals.home.pick} (${a.teamTotals.home.probability}%)<br>
      📊 Total proyectado: ${a.teamTotals.combinedProjectedTotal}
    </div>
  `;
}

loadGames();
</script>

</body>
</html>
